<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c10;--surface:#0d1117;--surface2:#141b24;
    --accent:#e8c84a;--accent2:#ff6b35;--text:#e8edf2;
    --muted:#5a6a7a;--border:rgba(255,255,255,0.07);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.2rem;display:flex;align-items:center;gap:1rem;height:60px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
  .sw{flex:1;position:relative}
  .sw input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.55rem 3rem .55rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s}
  .sw input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,200,74,.1)}
  .sw input::placeholder{color:var(--muted)}
  .sb{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:7px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
  .sb:hover{opacity:.85}
  main{padding:1.5rem 1.2rem;max-width:1200px;margin:0 auto}
  .hero{text-align:center;padding:4rem 1rem;animation:fadeUp .6s ease both}
  .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,15vw,6rem);letter-spacing:6px;line-height:1;background:linear-gradient(135deg,#e8edf2,#5a6a7a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.8rem}
  .hero p{color:var(--muted);font-size:.95rem;font-weight:300}
  .section-label{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--muted);margin-bottom:1.2rem}
  .section-label span{color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem}
  .card{cursor:pointer;border-radius:12px;overflow:hidden;background:var(--surface);border:1px solid var(--border);transition:transform .25s,box-shadow .25s,border-color .25s;animation:fadeUp .4s ease both}
  .card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 16px 40px rgba(0,0,0,.5);border-color:rgba(232,200,74,.35)}
  .card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface2)}
  .card-body{padding:.6rem}
  .card-title{font-size:.78rem;font-weight:500;line-height:1.3;margin-bottom:.35rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-meta{display:flex;align-items:center;justify-content:space-between}
  .card-date{font-size:.68rem;color:var(--muted)}
  .card-rating{font-size:.68rem;font-weight:500;color:var(--accent)}
  .badge{font-size:.58rem;padding:2px 6px;border-radius:4px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;display:inline-block;margin-bottom:.35rem}
  .b-movie{background:rgba(232,200,74,.15);color:var(--accent)}
  .b-series{background:rgba(255,107,53,.15);color:var(--accent2)}
  .b-other{background:rgba(90,106,122,.2);color:var(--muted)}
  .loading{display:flex;justify-content:center;align-items:center;padding:4rem;gap:1rem}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  .loading-txt{color:var(--muted);font-size:.85rem}
  .empty{text-align:center;padding:4rem;color:var(--muted);font-size:.9rem}
  .empty big{display:block;font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:4px;color:var(--surface2);margin-bottom:.5rem}
  .err-box{background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.15);border-radius:10px;padding:1rem;color:#ff8080;font-size:.85rem;text-align:center;margin-top:2rem}
  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn .2s ease both}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:slideUp .3s ease both;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
  .mclose{position:absolute;top:.8rem;right:.8rem;background:var(--surface2);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;color:var(--text);font-size:1rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s}
  .mclose:hover{background:rgba(255,255,255,.1)}
  .mgrid{display:grid;grid-template-columns:190px 1fr}
  .mposter{width:190px;aspect-ratio:2/3;object-fit:cover;border-radius:18px 0 0 18px;display:block}
  .mcontent{padding:1.5rem;display:flex;flex-direction:column;gap:.9rem}
  .mtitle{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;line-height:1.1;padding-right:2.5rem}
  .stats{display:flex;gap:1.2rem;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .stat-val{font-size:.85rem;font-weight:500}
  .gold{color:var(--accent)}
  .desc{font-size:.85rem;line-height:1.7;color:rgba(232,237,242,.75);font-weight:300}
  .tags{display:flex;flex-wrap:wrap;gap:.4rem}
  .tag{font-size:.68rem;padding:3px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
  .sec-lbl{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:var(--muted);font-size:.85rem;margin-bottom:.5rem}
  .cast-list{display:flex;gap:.7rem;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .cast-list::-webkit-scrollbar{display:none}
  .cast-item{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex-shrink:0;width:56px}
  .cast-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--surface2)}
  .cast-name{font-size:.6rem;text-align:center;color:var(--muted);line-height:1.2}
  .dl-list{display:flex;flex-direction:column;gap:.45rem}
  .dl-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;transition:border-color .2s}
  .dl-item:hover{border-color:rgba(232,200,74,.3)}
  .dl-info{display:flex;align-items:center;gap:.7rem}
  .dl-q{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;color:var(--accent)}
  .dl-s{font-size:.75rem;color:var(--muted)}
  .dl-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:600;font-size:.72rem;padding:.35rem .9rem;border-radius:7px;text-decoration:none;font-family:'DM Sans',sans-serif;transition:opacity .2s,transform .15s;display:inline-block}
  .dl-btn:hover{opacity:.85;transform:scale(1.04)}
  .mloading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:1rem;min-height:280px}
  @media(max-width:520px){
    .mgrid{grid-template-columns:1fr}
    .mposter{width:100%;border-radius:18px 18px 0 0;aspect-ratio:16/9}
    .mcontent{padding:1.2rem}
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:scale(.96) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo">CineVault</div>
  <div class="sw">
    <input type="text" id="si" placeholder="Search movies, series..." autocomplete="off"/>
    <button class="sb" id="sbtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="6"/><line x1="17" y1="17" x2="21" y2="21"/>
      </svg>
    </button>
  </div>
</header>

<main>
  <div id="hero" class="hero">
    <h1>Discover<br>Cinema</h1>
    <p>Search for any movie or series to get started</p>
  </div>
  <div id="loadingSearch" class="loading" style="display:none"><div class="spinner"></div><span class="loading-txt">Searching...</span></div>
  <div id="errBox" class="err-box" style="display:none">⚠️ API connection failed. Please try again.</div>
  <div id="emptyState" class="empty" style="display:none"><big>404</big>No results found. Try a different title.</div>
  <div id="resultsSection" style="display:none">
    <div class="section-label">RESULTS — <span id="rCount">0</span></div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<div id="overlay" style="display:none">
  <div class="modal" id="modal">
    <button class="mclose" id="mclose">✕</button>
    <div id="mbody"></div>
  </div>
</div>

<script>
const KEY='11d0642e3811dd1b';
const PROXY='https://corsproxy.io/?url=';
const SEARCH=`${PROXY}https://api-dark-shan-yt.koyeb.app/movie/moviepro-search`;
const INFO=`${PROXY}https://api-dark-shan-yt.koyeb.app/movie/moviepro-info`;

const $=id=>document.getElementById(id);
const si=$('si'),sbtn=$('sbtn'),hero=$('hero');
const loadS=$('loadingSearch'),errBox=$('errBox'),empty=$('emptyState');
const resSection=$('resultsSection'),rCount=$('rCount'),grid=$('grid');
const overlay=$('overlay'),modal=$('modal'),mbody=$('mbody'),mclose=$('mclose');

function badge(t){
  if(t===1)return['Movie','b-movie'];
  if(t===2)return['Series','b-series'];
  return['Clip','b-other'];
}

async function search(q){
  if(!q.trim())return;
  hero.style.display='none';
  errBox.style.display='none';
  empty.style.display='none';
  resSection.style.display='none';
  loadS.style.display='flex';
  grid.innerHTML='';
  try{
    const r=await fetch(`${SEARCH}?q=${encodeURIComponent(q)}&apikey=${KEY}`);
    const j=await r.json();
    loadS.style.display='none';
    if(!j.status||!j.data||!j.data.length){empty.style.display='block';return;}
    rCount.textContent=j.data.length;
    resSection.style.display='block';
    j.data.forEach((item,i)=>{
      const[lbl,cls]=badge(item.type);
      const yr=item.date?item.date.slice(0,4):'';
      const flag=item.country==='India'?' 🇮🇳':item.country==='United States'?' 🇺🇸':'';
      const c=document.createElement('div');
      c.className='card';c.style.animationDelay=`${i*.04}s`;
      c.innerHTML=`<img src="${item.image}" alt="${item.title}" loading="lazy" onerror="this.style.display='none'">
        <div class="card-body">
          <span class="badge ${cls}">${lbl}</span>
          <div class="card-title">${item.title}</div>
          <div class="card-meta">
            <span class="card-date">${yr}${flag}</span>
            ${item.rating>0?`<span class="card-rating">★ ${item.rating}</span>`:''}
          </div>
        </div>`;
      c.onclick=()=>openModal(item.id);
      grid.appendChild(c);
    });
  }catch(e){
    loadS.style.display='none';
    errBox.style.display='block';
  }
}

async function openModal(id){
  overlay.style.display='flex';
  document.body.style.overflow='hidden';
  mbody.innerHTML=`<div class="mloading"><div class="spinner"></div><span class="loading-txt">Loading details...</span></div>`;
  try{
    const r=await fetch(`${INFO}?id=${id}&apikey=${KEY}`);
    const j=await r.json();
    if(!j.status||!j.data)throw new Error();
    renderModal(j.data);
  }catch{
    mbody.innerHTML=`<div class="mloading"><div class="err-box">Failed to load details.</div></div>`;
  }
}

function renderModal(d){
  const genres=(d.genre||[]).map(g=>`<span class="tag">${g}</span>`).join('');
  const langs=(d.language||[]).map(l=>`<span class="tag">${l}</span>`).join('');
  const cast=d.cast?.length?`
    <div><div class="sec-lbl">CAST</div>
    <div class="cast-list">${d.cast.map(c=>`
      <div class="cast-item">
        <img class="cast-img" src="${c.url}" alt="${c.name}" onerror="this.style.opacity='.3'">
        <div class="cast-name">${c.name}</div>
      </div>`).join('')}</div></div>`:'';
  const dls=d.download?.length?`
    <div><div class="sec-lbl">DOWNLOAD</div>
    <div class="dl-list">${d.download.map(dl=>`
      <div class="dl-item">
        <div class="dl-info"><span class="dl-q">${dl.quality}</span><span class="dl-s">${dl.size}</span></div>
        <a class="dl-btn" href="${dl.link}" target="_blank" rel="noopener">Download</a>
      </div>`).join('')}</div></div>`:'';

  mbody.innerHTML=`<div class="mgrid">
    <img class="mposter" src="${d.image}" alt="${d.title}">
    <div class="mcontent">
      <div class="mtitle">${d.title}</div>
      <div class="stats">
        ${d.rating?`<div class="stat"><div class="stat-lbl">Rating</div><div class="stat-val gold">★ ${d.rating}</div></div>`:''}
        ${d.duration?`<div class="stat"><div class="stat-lbl">Duration</div><div class="stat-val">${d.duration}</div></div>`:''}
        ${d.year?`<div class="stat"><div class="stat-lbl">Year</div><div class="stat-val">${d.year}</div></div>`:''}
        ${d.country?`<div class="stat"><div class="stat-lbl">Country</div><div class="stat-val">${d.country}</div></div>`:''}
      </div>
      ${d.description?`<div class="desc">${d.description}</div>`:''}
      ${genres?`<div class="tags">${genres}</div>`:''}
      ${langs?`<div class="tags">${langs}</div>`:''}
      ${cast}${dls}
    </div>
  </div>`;
}

function closeModal(){overlay.style.display='none';document.body.style.overflow='';}

sbtn.onclick=()=>search(si.value);
si.onkeydown=e=>{if(e.key==='Enter')search(si.value);};
mclose.onclick=closeModal;
overlay.onclick=e=>{if(e.target===overlay)closeModal();};
document.onkeydown=e=>{if(e.key==='Escape')closeModal();};
</script>
</body>
</html>
